workflows:
  ios-release-workflow:
    name: PraxiaOne iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: praxia_mobile_app
    environment:
      flutter: stable
      # Changed from 15.4 to 26.2 to match Codemagic's current environment
      xcode: 26.2 
      cocoapods: default
    scripts:
      - name: Prepare Flutter and Plugins
        script: |
          flutter pub get
          # Pre-generating files to ensure podhelper.rb exists
          flutter precache --ios
          flutter build ios --config-only --no-codesign
      - name: Install CocoaPods
        script: |
          cd ios
          # Removing any existing lock file to prevent version conflicts
          rm -rf Pods
          rm -f Podfile.lock
          pod install
      - name: Build IPA
        script: |
          # The final archiving step
          flutter build ipa --release --no-codesign -t lib/main.dart
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - omkarambar@gmail.com
          