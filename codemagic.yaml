workflows:
  ios-release-workflow:
    name: PraxiaOne iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: praxia_mobile_app
    environment:
      flutter: stable
      xcode: 15.4 # Using a specific stable version
    scripts:
      - name: Prepare Flutter and Plugins
        script: |
          flutter pub get
          # This command creates the 'podhelper.rb' that the Podfile needs
          flutter precache --ios
          flutter build ios --config-only --no-codesign
      - name: Install CocoaPods
        script: |
          cd ios
          pod install
      - name: Build IPA
        script: |
          # The archive step
          flutter build ipa --release --no-codesign -t lib/main.dart
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - omkarambar@gmail.com
          