workflows:
  ios-release-workflow:
    name: PraxiaOne iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: praxia_mobile_app
    environment:
      flutter: stable
      xcode: latest
      groups:
        - apple_auth # Optional: Only if you've set up API keys in Codemagic
    scripts:
      - name: Initialize iOS Configuration
        script: |
          # Force Flutter to generate missing podhelper and symlinks on the Mac
          flutter pub get
          flutter build ios --config-only --no-codesign
      - name: Install CocoaPods
        script: |
          cd ios
          pod install
      - name: Build IPA
        script: |
          # Build the IPA for distribution/testing
          # --no-codesign allows the build to finish without Apple Certificates
          flutter build ipa --release --no-codesign -t lib/main.dart
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - omkarambar@gmail.com
          